<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Emerald green for Mukti Kendra
                        "background-light": "#f8f6f6",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-display bg-background-dark text-slate-100 min-h-screen relative overflow-x-hidden">
<!-- Background Image -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-60" data-alt="A banana with googly eyes on a dark background" src="data:image/...;base64,..."/>
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
</div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col min-h-screen max-w-md mx-auto">
<!-- Header -->
<header class="flex items-center p-4 gap-4 sticky top-0 bg-black/20 backdrop-blur-md z-20 justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full glass-panel text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight absolute left-1/2 -translate-x-1/2">Group Management</h1>
</header>
<!-- Content Area -->
<main class="flex-1 p-4 space-y-6 pb-32 flex flex-col justify-center">
<!-- Create Group Section -->
<section class="glass-panel p-6 rounded-xl space-y-4">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">group_add</span>
</div>
<div>
<h2 class="text-lg font-bold">Create Group</h2>
<p class="text-slate-400 text-sm">Lead your friends toward better habits together</p>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">Group Name</label>
<input class="glass-input w-full px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-primary/50 outline-none transition-all placeholder:text-slate-400" placeholder="Enter group name" type="text"/>
</div>
<button class="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3.5 rounded-xl border border-white/20 transition-all active:scale-95">
                    Create Group
                </button>
</section>
<!-- Join Group Section -->
<section class="glass-panel p-6 rounded-xl space-y-4">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">
<span class="material-symbols-outlined text-3xl">key</span>
</div>
<div>
<h2 class="text-lg font-bold">Join Group</h2>
<p class="text-slate-400 text-sm">Enter the 6-digit invitation code shared by your leader</p>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">Invitation Code</label>
<div class="flex gap-2 justify-between">
<input class="glass-input w-full px-4 py-3 rounded-xl text-white focus:ring-2 focus:ring-primary/50 outline-none transition-all placeholder:text-slate-400" maxlength="6" placeholder="0 0 0 0 0 0" type="text"/>
</div>
</div>
<button class="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3.5 rounded-xl border border-white/20 transition-all active:scale-95">
                    Join Group
                </button>
</section>
<!-- Empty State / Info -->
<div class="text-center px-8 py-4">
<p class="text-slate-400 text-xs uppercase tracking-widest font-semibold opacity-60">Mukti Kendra Habit Tracking</p>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-30 w-max">
<div class="flex bg-white/10 backdrop-blur-2xl rounded-full border border-white/20 px-8 py-3 gap-10 items-center shadow-2xl">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-[1] text-2xl">group</span>
<span class="text-[10px] font-bold">Groups</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</nav>
</div>
</body></html>
