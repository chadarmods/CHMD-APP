<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Emerald Green accent
                        "background-light": "#f8f6f6",
                        "background-dark": "#064e3b",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>.glass-container {
    background: rgba(6, 78, 59, 0.2);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1)
    }
.bg-banana {
    background-image: url("data:image/...;base64,...");
    background-size: cover;
    background-position: center
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-display bg-background-dark text-slate-100 antialiased">

<div class="fixed inset-0 bg-banana z-0" data-alt="A yellow banana with googly eyes on a colorful background">

<button class="flex items-center justify-center size-10 rounded-full bg-white/10 hover:bg-white/20 transition-colors">

</button>
<h1 class="flex-1 text-center text-xl font-bold tracking-tight text-white pr-10">Edit Profile</h1>
</header>
<!-- Main Glassmorphic Card -->
<main class="flex-1 flex flex-col justify-center px-6 pb-24">
<div class="glass-container rounded-[2rem] p-8 space-y-8 shadow-2xl">
<!-- Profile Header Section -->
<div class="flex flex-col items-center">
<div class="relative">
<div class="size-28 rounded-full border-4 border-primary p-1 bg-white/10 overflow-hidden">
<img alt="Alex Rivera Profile" class="w-full h-full object-cover rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCQSnbykB8fnT9jZXYsce94V6NLoZ0ZYZak_6XmgV_3OF7gGHZvSISMVY0ybBvnKS3GhobzKLcDnovpk34LMOO0_OZbcTQ19EoMhix3XADfn_GhaMxTJ-ajcdYjhf8cemNo0hGVfkIso7lggGwplubI5LXgMR8qMRJDmx2AiA8CvxqpQ2LLkT9f4LWOFVm0QMX9Uq5laUIQM2rzv_XFhcO35lD4xM2szeiibqNhn0uQx_cbIhoFjPSdZO-G9QULT5vsQuBXo-dd-fJ"/>
</div>
<button class="absolute bottom-0 right-0 size-8 bg-primary text-white rounded-full border-2 border-background-dark flex items-center justify-center hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-xs">photo_camera</span>
</button>
</div>
<div class="mt-4 text-center">
<h2 class="text-2xl font-bold text-white">Alex Rivera</h2>
<p class="text-primary font-medium opacity-90">alex.rivera@example.com</p>
</div>
</div>
<!-- Details Section -->
<div class="space-y-4 border-t border-white/10 pt-6">
<div class="flex justify-between items-center">
<span class="text-xs font-semibold text-slate-300 uppercase tracking-widest">Status</span>
<span class="bg-primary/20 text-primary text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded">Premium Member</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<p class="text-[10px] text-slate-400 uppercase tracking-wider">Active Groups</p>
<p class="text-lg font-bold text-white">12</p>
</div>
<div class="space-y-1 text-right">
<p class="text-[10px] text-slate-400 uppercase tracking-wider">Joined Date</p>
<p class="text-lg font-bold text-white">Jan 2024</p>
</div>
</div>
<div class="flex items-center gap-2 text-sm text-slate-200 bg-white/5 p-3 rounded-lg">
<span class="material-symbols-outlined text-primary">verified_user</span>
<span>Identity Verified Account</span>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-3">
<button class="w-full h-12 bg-primary hover:bg-emerald-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                Save Changes
            </button>
<button class="w-full h-12 border border-white/20 bg-white/5 hover:bg-white/10 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-rose-400 text-sm">logout</span>

            </button>
</div>
</div>
</main>
<!-- Liquid Bottom Navigation Bar -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
<nav class="glass-container flex items-center justify-between gap-10 px-10 py-3 rounded-full border border-white/20 shadow-2xl">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium tracking-wide">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">groups</span>
<span class="text-[10px] font-medium tracking-wide">Groups</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">

</a>
</nav>
